<!DOCTYPE html>
<html>
<head>
    <title>简单CORS测试</title>
</head>
<body>
    <h1>简单CORS测试</h1>
    <button onclick="testCORS()">测试CORS</button>
    <div id="result"></div>
    
    <script>
        async function testCORS() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '正在测试...';
            
            try {
                const response = await fetch('http://localhost:8001/api/gantt/1');
                if (!response.ok) {
                    throw new Error(`HTTP错误: ${response.status}`);
                }
                const data = await response.json();
                resultDiv.innerHTML = `✅ 成功! 获取到 ${data.tasks.length} 个任务`;
                console.log('API响应:', data);
            } catch (error) {
                resultDiv.innerHTML = `❌ 失败: ${error.message}`;
                console.error('CORS错误:', error);
            }
        }
        
        // 页面加载时自动测试
        window.onload = testCORS;
    </script>
</body>
</html>
