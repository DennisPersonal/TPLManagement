<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>模块修复测试</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 20px;
            background: #f8fafc;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            color: #1e293b;
            margin-bottom: 20px;
        }
        .test-section {
            margin: 20px 0;
            padding: 20px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
        }
        button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            margin: 10px 5px;
        }
        button:hover {
            background: #2563eb;
        }
        .result {
            margin-top: 10px;
            padding: 10px;
            background: #f1f5f9;
            border-radius: 6px;
            font-family: monospace;
        }
        .success { color: #10b981; }
        .error { color: #ef4444; }
    </style>
</head>
<body>
    <div class="container">
        <h1>模块修复测试</h1>
        
        <div class="test-section">
            <h3>1. 加载 modules.js</h3>
            <button onclick="loadModules()">加载模块</button>
            <div id="load-result" class="result"></div>
        </div>
        
        <div class="test-section">
            <h3>2. 测试 AI任务分解 功能</h3>
            <button onclick="testAITaskDecomposition()">测试AI任务分解</button>
            <div id="ai-test-result" class="result"></div>
        </div>
        
        <div class="test-section">
            <h3>3. 检查语法错误</h3>
            <button onclick="checkSyntax()">检查语法</button>
            <div id="syntax-result" class="result"></div>
        </div>
    </div>

    <script>
        let modulesLoaded = false;
        let moduleInstance = null;

        function loadModules() {
            const resultEl = document.getElementById('load-result');
            try {
                // 动态加载 modules.js
                const script = document.createElement('script');
                script.src = 'modules.js';
                script.onload = function() {
                    if (typeof ModuleManager !== 'undefined') {
                        moduleInstance = new ModuleManager();
                        modulesLoaded = true;
                        resultEl.innerHTML = '<span class="success">✅ modules.js 加载成功！ModuleManager 已初始化。</span>';
                        console.log('ModuleManager loaded:', moduleInstance);
                    } else {
                        resultEl.innerHTML = '<span class="error">❌ ModuleManager 未定义</span>';
                    }
                };
                script.onerror = function() {
                    resultEl.innerHTML = '<span class="error">❌ 加载 modules.js 失败</span>';
                };
                document.head.appendChild(script);
            } catch (error) {
                resultEl.innerHTML = `<span class="error">❌ 加载错误: ${error.message}</span>`;
            }
        }

        function testAITaskDecomposition() {
            const resultEl = document.getElementById('ai-test-result');
            
            if (!modulesLoaded || !moduleInstance) {
                resultEl.innerHTML = '<span class="error">❌ 请先加载模块</span>';
                return;
            }

            try {
                // 调用 AI任务分解 方法
                moduleInstance.showAITaskDecomposition();
                resultEl.innerHTML = '<span class="success">✅ AI任务分解 功能调用成功！应该显示模态窗口。</span>';
            } catch (error) {
                resultEl.innerHTML = `<span class="error">❌ 调用失败: ${error.message}</span>`;
                console.error('AI Task Decomposition error:', error);
            }
        }

        function checkSyntax() {
            const resultEl = document.getElementById('syntax-result');
            
            fetch('modules.js')
                .then(response => response.text())
                .then(code => {
                    try {
                        // 尝试解析 JavaScript 代码
                        new Function(code);
                        resultEl.innerHTML = '<span class="success">✅ 语法检查通过！没有语法错误。</span>';
                    } catch (error) {
                        resultEl.innerHTML = `<span class="error">❌ 语法错误: ${error.message}</span>`;
                        console.error('Syntax error:', error);
                        
                        // 尝试定位错误行号
                        const match = error.message.match(/line (\d+)/);
                        if (match) {
                            const lineNum = parseInt(match[1]);
                            const lines = code.split('\n');
                            const start = Math.max(0, lineNum - 3);
                            const end = Math.min(lines.length, lineNum + 2);
                            const context = lines.slice(start, end).map((line, i) => {
                                const lineNo = start + i + 1;
                                const prefix = lineNo === lineNum ? '❌ ' : '   ';
                                return `${prefix}${lineNo}: ${line}`;
                            }).join('\n');
                            
                            resultEl.innerHTML += `<pre style="margin-top: 10px; background: #1e293b; color: #f1f5f9; padding: 10px; border-radius: 6px;">${context}</pre>`;
                        }
                    }
                })
                .catch(error => {
                    resultEl.innerHTML = `<span class="error">❌ 无法读取 modules.js: ${error.message}</span>`;
                });
        }

        // 页面加载时自动检查语法
        window.addEventListener('DOMContentLoaded', checkSyntax);
    </script>
</body>
</html>
