<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>项目管理系统 - 正在跳转</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #4f46e5, #4338ca);
            color: white;
        }
        .container {
            text-align: center;
            padding: 40px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
        }
        p {
            font-size: 1.2rem;
            margin-bottom: 30px;
            opacity: 0.9;
        }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .link {
            color: white;
            text-decoration: underline;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 项目管理系统</h1>
        <p>正在加载主界面...</p>
        <div class="spinner"></div>
        <p>如果页面没有自动跳转，请点击 <a href="main.html" class="link">这里</a></p>
    </div>
    
    <script>
        // 3秒后自动跳转到主界面
        setTimeout(function() {
            window.location.href = "main.html";
        }, 3000);
        
        // 立即跳转（如果用户点击了链接）
        document.querySelector('.link').addEventListener('click', function(e) {
            e.preventDefault();
            window.location.href = "main.html";
        });
    </script>
</body>
</html>
