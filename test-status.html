<!DOCTYPE html>
<html>
<head>
    <title>状态测试</title>
</head>
<body>
    <h1>后端状态测试</h1>
    <div id="result"></div>
    
    <script>
        async function testStatus() {
            const resultDiv = document.getElementById('result');
            
            try {
                // 测试健康检查
                const healthRes = await fetch('http://localhost:8001/api/health');
                const healthData = await healthRes.json();
                resultDiv.innerHTML += `<p>✅ 健康检查: ${JSON.stringify(healthData)}</p>`;
                
                // 测试状态检查
                const statusRes = await fetch('http://localhost:8001/api/status');
                const statusData = await statusRes.json();
                resultDiv.innerHTML += `<p>✅ 状态检查: ${JSON.stringify(statusData)}</p>`;
                
                // 显示详细状态
                resultDiv.innerHTML += '<h3>组件状态:</h3>';
                for (const [component, info] of Object.entries(statusData.components)) {
                    resultDiv.innerHTML += `<p>${component}: ${info.status} - ${info.message}</p>`;
                }
                
            } catch (error) {
                resultDiv.innerHTML = `<p style="color: red">❌ 错误: ${error.message}</p>`;
            }
        }
        
        testStatus();
    </script>
</body>
</html>
